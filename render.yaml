# Render Blueprint — deploys the whole demo as ONE web service:
#   /        public landing page + voice WebSocket
#   /admin   Mastra Studio, basic-auth gated (set ADMIN_USERNAME/ADMIN_PASSWORD)
#
# Deploy: push to GitHub → Render dashboard → New → Blueprint → pick the repo.
# You'll be prompted for the three secret env vars on first deploy.
services:
  - type: web
    name: mastra-design-agent
    runtime: node
    plan: starter # free works too, but spins down when idle (slow first hit)
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/state
    # Persistent disk: Studio instruction edits (the stored-agents DB) survive
    # deploys and restarts. Without it, /admin edits reset on every deploy.
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: DATABASE_URL
        value: file:/var/data/mastra.db
      - key: INWORLD_API_KEY
        sync: false # Base64 "runtime key" from platform.inworld.ai — paste verbatim
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Optional model overrides — both route through Inworld's OpenAI-compatible
      # router and have sensible code defaults, so leave them unset to use the
      # defaults. To pin a different model, add the var in the Render dashboard
      # (Environment), or uncomment a block below to fix it in the blueprint.
      #   INWORLD_REALTIME_MODEL — realtime voice LLM
      #                            (default: inworld/models/gemma-4-26b-a4b-it; e.g. openai/gpt-5.5)
      #   INWORLD_TEXT_MODEL     — Studio text-chat model (default: openai/gpt-4.1)
      # - key: INWORLD_REALTIME_MODEL
      #   value: openai/gpt-5.5
      # - key: INWORLD_TEXT_MODEL
      #   value: openai/gpt-4.1
